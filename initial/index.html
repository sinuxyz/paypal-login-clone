<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Raphael">
    <meta name="description" content="A clone of PayPal App 🤠">
    <link rel="shortcut icon" href="https://www.paypalobjects.com/en_US/i/icon/pp_favicon_x.ico" type="image/x-icon">
    <title>Log in to your PayPal account</title>
    <link rel="stylesheet" href="assets/styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body>
    <main class="main">
        <form action="" clas="main__form">
            <img class="form__logo" src="https://www.paypalobjects.com/images/shared/paypal-logo-129x32.svg"
                alt="Paypal">

            <input class="form__input" type="email" name="email-input" id="input" placeholder="Email or mobile number"
                autocomplete="off">

            <button class="form__button" type="submit">Next</button>
            <!-- Line -->
            <span class="form__line">or</span>

            <button class="form__button gray">Sign Up</button>
            <!-- Navbar of Languages-->
            <ul class="form__languages">
                <li><a href="#" class="current">English</a></li>
                <li><a href="#">Français</a></li>
                <li><a href="#">Español</a></li>
                <li><a href="#">中文</a></li>
            </ul>
        </form>
    </main>
    <footer class="footer">
        <span>Made with 💓 by Raphael</span>
    </footer>
</body>

</html>
